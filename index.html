<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>戦国恋愛絵巻AI版</title>
<style>
body {
  margin: 0;
  font-family: serif;
  background: url("https://images.unsplash.com/photo-1549880338-65ddcdfd017b") no-repeat center/cover;
  color: white;
}
#game {
  background: rgba(0,0,0,0.7);
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
#character img { height: 320px; }
#text { padding: 20px; font-size: 18px; }
button {
  display:block;
  width:90%;
  margin:10px auto;
  padding:10px;
  background:#6b2c2c;
  color:white;
  border:none;
}
</style>
</head>
<body>

<div id="game">
  <div id="character">
    <img id="charImg">
    <h2 id="charName"></h2>
  </div>
  <div id="text"></div>
  <div id="choices"></div>
</div>

<script>
// ===== APIキー =====
const STABLE_API = "ここにStableDiffusionのAPIキー";
const VOICE_API = "ここにElevenLabsのAPIキー";

// ===== キャラプロンプト =====
const prompts = {
  nobunaga: "handsome samurai oda nobunaga, anime style, ultra detailed, cool face",
  hideyoshi: "handsome samurai toyotomi hideyoshi, friendly smile, anime style",
  masamune: "handsome samurai date masamune, eyepatch, cool anime style"
};

// ===== AI画像生成 =====
async function generateImage(type){
  const res = await fetch("https://api.stability.ai/v2beta/stable-image/generate/core", {
    method:"POST",
    headers:{
      "Authorization": "Bearer " + STABLE_API,
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      prompt: prompts[type],
      output_format: "jpeg"
    })
  });

  const blob = await res.blob();
  return URL.createObjectURL(blob);
}

// ===== ボイス生成 =====
async function speak(text){
  const res = await fetch("https://api.elevenlabs.io/v1/text-to-speech/voice-id", {
    method:"POST",
    headers:{
      "xi-api-key": VOICE_API,
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      text: text,
      voice_settings: {
        stability: 0.5,
        similarity_boost: 0.8
      }
    })
  });

  const blob = await res.blob();
  const audio = new Audio(URL.createObjectURL(blob));
  audio.play();
}

// ===== シナリオ =====
const story = {
  start:{
    text:"あなたは戦国時代に迷い込んだ…誰に会う？",
    choices:[
      {text:"信長", next:"n1"},
      {text:"秀吉", next:"h1"},
      {text:"政宗", next:"m1"}
    ]
  },

  n1:{
    char:"織田信長",
    img:"nobunaga",
    text:"…貴様、ただ者ではないな。",
    choices:[
      {text:"あなたに惹かれる", next:"end"},
      {text:"怖い…", next:"end2"}
    ]
  },

  h1:{
    char:"豊臣秀吉",
    img:"hideyoshi",
    text:"ええ顔しとるやないか！",
    choices:[
      {text:"優しいですね", next:"end"},
      {text:"怪しい…", next:"end2"}
    ]
  },

  m1:{
    char:"伊達政宗",
    img:"masamune",
    text:"面白い女だ。",
    choices:[
      {text:"好きかも", next:"end"},
      {text:"距離を置く", next:"end2"}
    ]
  },

  end:{
    text:"恋が始まる――",
    choices:[{text:"最初へ", next:"start"}]
  },

  end2:{
    text:"すれ違いのまま終わった…",
    choices:[{text:"戻る", next:"start"}]
  }
};

// ===== 表示 =====
async function showScene(key){
  const scene = story[key];
  document.getElementById("text").innerText = scene.text;
  document.getElementById("charName").innerText = scene.char || "";

  if(scene.img){
    const imgURL = await generateImage(scene.img);
    document.getElementById("charImg").src = imgURL;
  }

  speak(scene.text);

  const choicesDiv = document.getElementById("choices");
  choicesDiv.innerHTML = "";

  scene.choices.forEach(c=>{
    const btn = document.createElement("button");
    btn.innerText = c.text;
    btn.onclick = ()=>showScene(c.next);
    choicesDiv.appendChild(btn);
  });
}

showScene("start");
</script>

</body>
</html>
