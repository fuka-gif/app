<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>国宝級イケメン恋愛ゲーム</title>
<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: linear-gradient(#1a1a2e, #000);
    color: white;
    text-align: center;
}

#game {
    max-width: 400px;
    margin: auto;
}

#image {
    width: 100%;
    height: 300px;

    /* 👇ここに画像が埋め込まれている前提 */
    background-image: url("data:image/png;base64,ここに画像データ");

    background-size: 1000% 100%;
}

#name {
    font-size: 22px;
    margin-top: 10px;
}

#text {
    margin: 20px;
    min-height: 100px;
}

.choice {
    display: block;
    margin: 8px;
    padding: 10px;
    background: #444;
    border-radius: 10px;
    cursor: pointer;
}

.choice:hover {
    background: #666;
}
</style>
</head>
<body>

<div id="game">
    <div id="image"></div>
    <div id="name">キャラを選んでください</div>
    <div id="text">運命の相手を選ぼう</div>
    <div id="choices"></div>
</div>

<script>
let affection = 0;
let selectedChar = null;

const characters = [
 {name:"👼 天使", pos:0, type:"angel"},
 {name:"😈 悪魔", pos:1, type:"devil"},
 {name:"🧙 仙人", pos:2, type:"sage"},
 {name:"⚔️ 剣士", pos:3, type:"knight"},
 {name:"🎸 バンドマン", pos:4, type:"band"},
 {name:"📚 メガネ", pos:5, type:"smart"},
 {name:"🏀 スポーツ", pos:6, type:"sport"},
 {name:"🌸 幼なじみ", pos:7, type:"child"},
 {name:"👔 エリート", pos:8, type:"elite"},
 {name:"🕶️ ミステリアス", pos:9, type:"mystery"}
];

function showCharacterSelect(){
    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    characters.forEach(c=>{
        const btn = document.createElement("div");
        btn.className = "choice";
        btn.innerText = c.name;
        btn.onclick = ()=>{
            selectedChar = c;
            affection = 0;
            startStory();
        };
        choices.appendChild(btn);
    });
}

function startStory(){
    document.getElementById("image").style.backgroundPosition =
        (-selectedChar.pos * 100) + "% 0";

    document.getElementById("name").innerText = selectedChar.name;

    current = "start";
    showScene();
}

function getLine(type){
    const lines = {
        angel:["君は特別だ","守るよ","愛してる"],
        devil:["逃げるなよ","楽しいな","支配したい"],
        sage:["運命じゃな","導こう","安心せい"],
        knight:["守る","任せろ","信じてくれ"],
        band:["ノッてるね","最高だ","もっと楽しもう"],
        smart:["興味深い","論理的だ","特別だ"],
        sport:["いくぞ！","楽しい！","最高！"],
        child:["懐かしいね","安心する","ずっと一緒"],
        elite:["完璧だ","計画通り","必要だ"],
        mystery:["…面白い","気になる","離れるな"]
    };
    return lines[type][Math.floor(Math.random()*3)];
}

const story = {
start:{
 text:"君に出会えた気がする",
 choices:[
  {text:"誰？", next:"a", aff:1},
  {text:"運命？", next:"b", aff:2}
 ]
},
a:{
 text:function(){return getLine(selectedChar.type);},
 choices:[
  {text:"話したい", next:"c", aff:2},
  {text:"帰る", next:"bad", aff:-3}
 ]
},
b:{
 text:function(){return getLine(selectedChar.type);},
 choices:[
  {text:"信じる", next:"c", aff:2},
  {text:"怪しい", next:"c", aff:0}
 ]
},
c:{
 text:function(){return getLine(selectedChar.type);},
 choices:[
  {text:"好きかも", next:"end", aff:3},
  {text:"まだ", next:"end", aff:0}
 ]
},
end:{
 text:function(){
   if(affection>=6) return "🌟ハッピーエンド";
   if(affection>=3) return "💖ノーマルエンド";
   return "😢ビターエンド";
 },
 choices:[
  {text:"もう一度", next:"reset", aff:0}
 ]
},
bad:{
 text:"去ってしまった…",
 choices:[
  {text:"戻る", next:"reset", aff:0}
 ]
},
reset:{ text:"", choices:[] }
};

let current = "start";

function showScene(){
    const scene = story[current];

    document.getElementById("text").innerText =
      typeof scene.text === "function" ? scene.text() : scene.text;

    const choicesDiv = document.getElementById("choices");
    choicesDiv.innerHTML = "";

    scene.choices.forEach(choice=>{
        const btn = document.createElement("div");
        btn.className = "choice";
        btn.innerText = choice.text;
        btn.onclick = ()=>{
            if(choice.next==="reset"){
                showCharacterSelect();
                return;
            }
            affection += choice.aff;
            current = choice.next;
            showScene();
        };
        choicesDiv.appendChild(btn);
    });
}

showCharacterSelect();
</script>

</body>
</html>
