<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>国宝級イケメン恋愛シミュレーション</title>
<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: linear-gradient(#1a1a2e, #000);
    color: white;
    text-align: center;
}

#game {
    max-width: 400px;
    margin: auto;
}

#image {
    width: 100%;
    height: 300px;
    background-image: url("a_collection_of_ten_digital_anime_style_illustrati.png");
    background-size: 1000% 100%;
}

#name {
    font-size: 22px;
    margin-top: 10px;
}

#text {
    margin: 20px;
    min-height: 100px;
}

.choice {
    display: block;
    margin: 10px;
    padding: 10px;
    background: #444;
    border-radius: 10px;
    cursor: pointer;
}

.choice:hover {
    background: #666;
}
</style>
</head>
<body>

<div id="game">
    <div id="image"></div>
    <div id="name"></div>
    <div id="text"></div>
    <div id="choices"></div>
</div>

<script>
let affection = 0;

// キャラ（今回は天使イケメン固定で長編）
const character = {
    name: "👼 天使のイケメン",
    pos: 0
};

document.getElementById("image").style.backgroundPosition = "0% 0";
document.getElementById("name").innerText = character.name;

// シナリオ
const story = {

start: {
    text: "君、こんなところで何してるの？",
    choices: [
        {text:"あなたは誰？", next:"q1", affection:0},
        {text:"迷子なの…", next:"q2", affection:1}
    ]
},

q1: {
    text: "俺？ただの通りすがり…って言ったら信じる？",
    choices: [
        {text:"信じる", next:"q3", affection:1},
        {text:"怪しい…", next:"q4", affection:-1}
    ]
},

q2: {
    text: "そっか、じゃあ一緒に帰ろうか",
    choices: [
        {text:"ありがとう", next:"q3", affection:2},
        {text:"大丈夫", next:"q4", affection:-1}
    ]
},

q3: {
    text: "君って優しいね。もっと話したいな",
    choices: [
        {text:"私も", next:"q5", affection:2},
        {text:"どうかな…", next:"q6", affection:-1}
    ]
},

q4: {
    text: "警戒されちゃったか…でも嫌いじゃない",
    choices: [
        {text:"ごめんね", next:"q5", affection:1},
        {text:"当然でしょ", next:"q6", affection:-2}
    ]
},

q5: {
    text: "じゃあ少しだけデートしようか",
    choices: [
        {text:"いいよ", next:"date1", affection:2},
        {text:"ちょっとだけ", next:"date1", affection:1}
    ]
},

q6: {
    text: "無理しなくていいよ。でも離れたくないな",
    choices: [
        {text:"じゃあ少しだけ", next:"date1", affection:1},
        {text:"やっぱ帰る", next:"badEnd", affection:-3}
    ]
},

// デートパート（長め）
date1: {
    text: "どこ行きたい？",
    choices: [
        {text:"カフェ", next:"date2", affection:2},
        {text:"公園", next:"date3", affection:1},
        {text:"どこでもいい", next:"date4", affection:0}
    ]
},

date2: {
    text: "甘いもの好き？一緒に食べよう",
    choices: [
        {text:"好き！", next:"mid1", affection:2},
        {text:"普通", next:"mid1", affection:0}
    ]
},

date3: {
    text: "風気持ちいいね…君といると落ち着く",
    choices: [
        {text:"嬉しい", next:"mid1", affection:2},
        {text:"そうかな", next:"mid1", affection:0}
    ]
},

date4: {
    text: "君らしいね。でも嫌いじゃない",
    choices: [
        {text:"ありがとう", next:"mid1", affection:1},
        {text:"適当でごめん", next:"mid1", affection:-1}
    ]
},

mid1: {
    text: "ねえ、俺のことどう思う？",
    choices: [
        {text:"好きかも", next:"mid2", affection:3},
        {text:"まだ分からない", next:"mid2", affection:0}
    ]
},

mid2: {
    text: "そっか…でも俺はもう決めてるよ",
    choices: [
        {text:"え？", next:"endCheck", affection:0},
        {text:"なにを？", next:"endCheck", affection:1}
    ]
},

endCheck: {
    text: "君を離さないってこと",
    choices: [
        {text:"嬉しい", next:"end", affection:2},
        {text:"ちょっと怖い", next:"end", affection:-1}
    ]
},

end: {
    text: function(){
        if(affection >= 8) return "🌟ハッピーエンド：君は俺の運命だ";
        if(affection >= 4) return "💖ノーマルエンド：これから知っていこう";
        return "😢ビターエンド：また会えるかな";
    },
    choices: []
},

badEnd: {
    text: "君は去っていった…",
    choices: []
}

};

let current = "start";

function showScene() {
    const scene = story[current];

    document.getElementById("text").innerText =
        typeof scene.text === "function" ? scene.text() : scene.text;

    const choicesDiv = document.getElementById("choices");
    choicesDiv.innerHTML = "";

    scene.choices.forEach(choice => {
        const btn = document.createElement("div");
        btn.className = "choice";
        btn.innerText = choice.text;
        btn.onclick = () => {
            affection += choice.affection;
            current = choice.next;
            showScene();
        };
        choicesDiv.appendChild(btn);
    });
}

showScene();
</script>

</body>
</html>
