<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>戦国恋愛絵巻 改良版</title>

<style>
body {
  margin:0;
  font-family: serif;
  color:white;
  background-size:cover;
  background-position:center;
  transition:1s;
}

#game {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  background:rgba(0,0,0,0.4);
}

#character {
  position:absolute;
  bottom:130px;
  left:50%;
  transform:translateX(-50%);
}

#character img {
  height:380px;
}

#ui {
  background:rgba(0,0,0,0.7);
  padding:15px;
}

#name { color:#ffcccc; }

button {
  width:100%;
  margin-top:8px;
  padding:10px;
  background:#7a2f2f;
  border:none;
  color:white;
}

button:hover {
  background:#a33;
}

#love {
  position:absolute;
  top:10px;
  left:10px;
  background:rgba(0,0,0,0.6);
  padding:5px;
}
</style>
</head>

<body>

<div id="love">好感度: 0</div>

<div id="character">
  <img id="charImg">
</div>

<div id="game">
  <div id="ui">
    <div id="name"></div>
    <div id="text"></div>
    <div id="choices"></div>
  </div>
</div>

<script>
// ===== 状態 =====
let love = 0;
let route = "";

// ===== 背景 =====
const backgrounds = {
  castle:"https://images.unsplash.com/photo-1549692520-acc6669e2f0c",
  room:"https://images.unsplash.com/photo-1505842465776-3d90f6163106",
  night:"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"
};

// ===== キャラ画像（AI風） =====
const images = {
  nobunaga:"https://images.unsplash.com/photo-1607746882042-944635dfe10e",
  hideyoshi:"https://images.unsplash.com/photo-1544005313-94ddf0286df2",
  masamune:"https://images.unsplash.com/photo-1535713875002-d1d0cf377fde"
};

// ===== ボイス =====
function speak(text){
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang="ja-JP";
  speechSynthesis.speak(msg);
}

// ===== シナリオ =====
const story = {

start:{
  bg:"castle",
  text:"戦国時代――あなたは誰と出会う？",
  choices:[
    {text:"織田信長", next:"n_intro"},
    {text:"豊臣秀吉", next:"h_intro"},
    {text:"伊達政宗", next:"m_intro"}
  ]
},

// ===== 信長ルート =====
n_intro:{
  bg:"room",
  char:"織田信長",
  img:"nobunaga",
  text:"…貴様、名は？",
  setRoute:"n",
  choices:[
    {text:"名乗る（礼儀正しく）+5", next:"n_2", love:5},
    {text:"黙る（強気）+10", next:"n_2b", love:10}
  ]
},

n_2:{
  bg:"room",
  char:"織田信長",
  img:"nobunaga",
  text:"ほう、素直な奴だ。",
  choices:[
    {text:"近づく +10", next:"n_3", love:10},
    {text:"距離を取る -5", next:"n_bad", love:-5}
  ]
},

n_2b:{
  bg:"room",
  char:"織田信長",
  img:"nobunaga",
  text:"フッ…面白い。",
  choices:[
    {text:"挑発する +10", next:"n_3", love:10},
    {text:"謝る -5", next:"n_bad", love:-5}
  ]
},

n_3:{
  bg:"night",
  char:"織田信長",
  img:"nobunaga",
  text:"俺について来い。",
  choices:[
    {text:"ついていく", next:"judge"},
    {text:"断る", next:"n_bad"}
  ]
},

n_bad:{
  bg:"night",
  text:"信長は去った…",
  choices:[{text:"戻る", next:"start"}]
},

// ===== 秀吉ルート =====
h_intro:{
  bg:"castle",
  char:"豊臣秀吉",
  img:"hideyoshi",
  text:"ええ子やなぁ！",
  setRoute:"h",
  choices:[
    {text:"笑う +10", next:"judge", love:10},
    {text:"警戒する -5", next:"h_bad", love:-5}
  ]
},

h_bad:{
  bg:"night",
  text:"信用されなかった…",
  choices:[{text:"戻る", next:"start"}]
},

// ===== 政宗ルート =====
m_intro:{
  bg:"night",
  char:"伊達政宗",
  img:"masamune",
  text:"退屈は嫌いだ。",
  setRoute:"m",
  choices:[
    {text:"面白い話をする +10", next:"judge", love:10},
    {text:"黙る -5", next:"m_bad", love:-5}
  ]
},

m_bad:{
  bg:"night",
  text:"興味を失われた…",
  choices:[{text:"戻る", next:"start"}]
},

// ===== 判定（ここが重要） =====
judge:{
  bg:"night",
  text:"――運命の分かれ道",
  choices:[
    {text:"結果を見る", next:"result"}
  ]
},

result:{
  bg:"night",
  text: function(){
    if(route==="n" && love>=20) return "信長『貴様は俺のものだ』→恋愛成功";
    if(route==="h" && love>=10) return "秀吉『ずっと一緒や！』→恋愛成功";
    if(route==="m" && love>=10) return "政宗『悪くない』→恋愛成功";
    return "想いは届かなかった…";
  },
  choices:[
    {text:"最初へ", next:"start"}
  ]
}

};

// ===== 表示 =====
function showScene(key){
  const scene = story[key];

  // 背景
  if(scene.bg){
    document.body.style.backgroundImage = "url("+backgrounds[scene.bg]+")";
  }

  // ルート設定
  if(scene.setRoute){
    route = scene.setRoute;
    love = 0;
  }

  // テキスト
  const text = typeof scene.text === "function" ? scene.text() : scene.text;
  document.getElementById("text").innerText = text;

  // 名前
  document.getElementById("name").innerText = scene.char || "";

  // 画像
  if(scene.img){
    document.getElementById("charImg").src = images[scene.img];
  } else {
    document.getElementById("charImg").src = "";
  }

  // 好感度
  document.getElementById("love").innerText = "好感度: " + love;

  speak(text);

  // 選択肢
  const div = document.getElementById("choices");
  div.innerHTML = "";

  scene.choices.forEach(c=>{
    const btn = document.createElement("button");
    btn.innerText = c.text;

    btn.onclick = ()=>{
      if(c.love) love += c.love;
      showScene(c.next);
    };

    div.appendChild(btn);
  });
}

// スタート
showScene("start");
</script>

</body>
</html>
