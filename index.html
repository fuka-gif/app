<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>国宝級イケメンガチャ</title>
<style>
body {
    margin: 0;
    font-family: sans-serif;
    text-align: center;
    background: radial-gradient(circle, #1a1a2e, #000);
    color: white;
}

h1 { margin: 20px; }

button {
    padding: 15px 30px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    background: gold;
    cursor: pointer;
}

#card {
    width: 240px;
    height: 320px;
    margin: 30px auto;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 0 25px rgba(255,255,255,0.3);
}

/* ←ここが重要：1枚画像を切り出す */
.card-img {
    width: 100%;
    height: 100%;
    background-image: url("a_collection_of_ten_digital_anime_style_illustrati.png");
    background-size: 1000% 100%; /* 横に10分割 */
}

#result {
    font-size: 22px;
    margin-top: 20px;
}

.rare {
    color: gold;
    animation: glow 1s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px gold; }
    to { text-shadow: 0 0 40px yellow; }
}

.spin {
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotateY(0deg); }
    100% { transform: rotateY(360deg); }
}
</style>
</head>
<body>

<h1>✨国宝級イケメンガチャ✨</h1>
<button onclick="drawGacha()">ガチャを引く</button>

<div id="card">
    <div id="img" class="card-img"></div>
</div>

<div id="result">ボタンを押してガチャを引こう！</div>

<script>
const characters = [
    {name:"👼 天使のイケメン", pos:0, rare:true, voice:"君に出会うために来たよ"},
    {name:"😈 悪魔のイケメン", pos:1, rare:true, voice:"逃げられると思う？"},
    {name:"🧙 仙人のイケメン", pos:2, rare:true, voice:"これは運命じゃな"},

    {name:"⚔️ 剣士イケメン", pos:3, voice:"守るよ"},
    {name:"🎸 バンドマン", pos:4, voice:"俺の音、感じろ"},
    {name:"📚 メガネ男子", pos:5, voice:"興味深い"},
    {name:"🏀 スポーツ男子", pos:6, voice:"勝負しようぜ"},
    {name:"🌸 幼なじみ", pos:7, voice:"ずっと一緒だよな"},
    {name:"👔 エリート", pos:8, voice:"完璧だ"},
    {name:"🕶️ ミステリアス", pos:9, voice:"…悪くない"}
];

function speak(text) {
    const uttr = new SpeechSynthesisUtterance(text);
    uttr.lang = "ja-JP";
    speechSynthesis.cancel();
    speechSynthesis.speak(uttr);
}

function drawGacha() {
    const card = document.getElementById("card");
    const img = document.getElementById("img");
    const result = document.getElementById("result");

    result.innerHTML = "・・・演出中・・・";
    card.classList.add("spin");

    setTimeout(() => {
        card.classList.remove("spin");

        const rand = Math.random() * 100;
        let selected;

        if (rand < 1) selected = characters[0];
        else if (rand < 2) selected = characters[1];
        else if (rand < 3) selected = characters[2];
        else selected = characters[3 + Math.floor(Math.random()*7)];

        /* ←ここで画像位置変更 */
        img.style.backgroundPosition = (-selected.pos * 100) + "% 0";

        if (selected.rare) {
            result.innerHTML = "🌟大当たり！🌟<br>" + selected.name;
            result.className = "rare";
        } else {
            result.innerHTML = selected.name;
            result.className = "";
        }

        speak(selected.voice);

    }, 1200);
}
</script>

</body>
</html>
