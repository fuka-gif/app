<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>戦国恋愛絵巻 -乙女編-</title>

<style>
body {
  margin:0;
  background:url("https://images.unsplash.com/photo-1524492412937-b28074a5d7da") no-repeat center/cover;
  font-family: "Hiragino Mincho ProN", serif;
  color:white;
}

/* 全体 */
#game {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  background:rgba(0,0,0,0.4);
}

/* 立ち絵 */
#character {
  position:absolute;
  bottom:120px;
  left:50%;
  transform:translateX(-50%);
}
#character img {
  height:400px;
  transition:0.5s;
}

/* テキストウィンドウ */
#ui {
  background:rgba(0,0,0,0.7);
  padding:15px;
}

#name {
  font-size:20px;
  color:#ffcccb;
}

#text {
  font-size:18px;
  margin-top:5px;
}

/* 選択肢 */
button {
  width:100%;
  margin-top:8px;
  padding:10px;
  background:#8b3a3a;
  border:none;
  color:white;
  cursor:pointer;
}
button:hover {
  background:#b04a4a;
}

/* 好感度 */
#love {
  position:absolute;
  top:10px;
  left:10px;
  background:rgba(0,0,0,0.6);
  padding:5px 10px;
}
</style>
</head>

<body>

<div id="love">好感度: 0</div>

<div id="character">
  <img id="charImg">
</div>

<div id="game">
  <div id="ui">
    <div id="name"></div>
    <div id="text"></div>
    <div id="choices"></div>
  </div>
</div>

<script>
// ===== APIキー =====
const STABLE_API = "ここにStableDiffusionキー";
const VOICE_API = "ここにElevenLabsキー";

// ===== 状態 =====
let love = 0;
let currentChar = "";

// ===== キャラ設定 =====
const chars = {
  nobunaga:{
    name:"織田信長",
    prompt:"handsome samurai oda nobunaga, anime style, ultra detailed",
    voice:"EXAVITQu4vr4xnSDxMaL" //例
  },
  hideyoshi:{
    name:"豊臣秀吉",
    prompt:"handsome samurai smiling anime style",
    voice:"TxGEqnHWrfWFTfGW9XjX"
  },
  masamune:{
    name:"伊達政宗",
    prompt:"cool eyepatch samurai anime",
    voice:"VR6AewLTigWG4xSOukaG"
  }
};

// ===== AI画像 =====
async function generateImage(prompt){
  const res = await fetch("https://api.stability.ai/v2beta/stable-image/generate/core",{
    method:"POST",
    headers:{
      "Authorization":"Bearer "+STABLE_API,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      prompt:prompt,
      output_format:"jpeg"
    })
  });
  const blob = await res.blob();
  return URL.createObjectURL(blob);
}

// ===== ボイス =====
async function speak(text, voiceId){
  const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`,{
    method:"POST",
    headers:{
      "xi-api-key":VOICE_API,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({text})
  });

  const blob = await res.blob();
  const audio = new Audio(URL.createObjectURL(blob));
  audio.play();
}

// ===== シナリオ =====
const story = {
start:{
  text:"戦国時代――あなたは誰と運命を紡ぐ？",
  choices:[
    {text:"信長", next:"n1"},
    {text:"秀吉", next:"h1"},
    {text:"政宗", next:"m1"}
  ]
},

n1:{
  char:"nobunaga",
  text:"…俺の前に立つとは、いい度胸だ。",
  choices:[
    {text:"惹かれます (+10)", next:"n2", love:10},
    {text:"怖いです (-5)", next:"n3", love:-5}
  ]
},
n2:{
  char:"nobunaga",
  text:"フッ…面白い女だ。",
  choices:[
    {text:"もっと知りたい (+10)", next:"end", love:10},
    {text:"距離を置く (-5)", next:"end2", love:-5}
  ]
},
n3:{
  char:"nobunaga",
  text:"弱き者は不要だ。",
  choices:[
    {text:"強くなる (+5)", next:"end", love:5},
    {text:"逃げる (-10)", next:"end2", love:-10}
  ]
},

h1:{
  char:"hideyoshi",
  text:"ええ子やなぁ！ワシ好きやで！",
  choices:[
    {text:"優しい (+10)", next:"end", love:10},
    {text:"軽い (-5)", next:"end2", love:-5}
  ]
},

m1:{
  char:"masamune",
  text:"退屈はさせるなよ。",
  choices:[
    {text:"惹かれる (+10)", next:"end", love:10},
    {text:"怖い (-5)", next:"end2", love:-5}
  ]
},

end:{
  text:"恋が始まる――",
  choices:[{text:"最初へ", next:"start"}]
},
end2:{
  text:"すれ違いのまま終わった…",
  choices:[{text:"戻る", next:"start"}]
}
};

// ===== 表示 =====
async function showScene(key){
  const scene = story[key];

  document.getElementById("text").innerText = scene.text;

  if(scene.char){
    currentChar = scene.char;
    const c = chars[scene.char];

    document.getElementById("name").innerText = c.name;

    const img = await generateImage(c.prompt);
    document.getElementById("charImg").src = img;

    speak(scene.text, c.voice);
  } else {
    document.getElementById("name").innerText = "";
  }

  document.getElementById("love").innerText = "好感度: " + love;

  const choicesDiv = document.getElementById("choices");
  choicesDiv.innerHTML = "";

  scene.choices.forEach(c=>{
    const btn = document.createElement("button");
    btn.innerText = c.text;

    btn.onclick = ()=>{
      love += c.love || 0;
      showScene(c.next);
    };

    choicesDiv.appendChild(btn);
  });
}

// ===== スタート =====
showScene("start");
</script>

</body>
</html>
