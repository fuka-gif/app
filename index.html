<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>戦国恋愛絵巻 完全版</title>

<style>
body{
  margin:0;
  font-family:serif;
  color:white;
  background-size:cover;
  background-position:center;
  transition:1s;
}

#game{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  background:rgba(0,0,0,0.5);
}

#character{
  position:absolute;
  bottom:130px;
  left:50%;
  transform:translateX(-50%);
}

#character img{
  height:380px;
}

#ui{
  background:rgba(0,0,0,0.75);
  padding:15px;
}

#name{ color:#ffcccc; }

button{
  width:100%;
  margin-top:8px;
  padding:10px;
  background:#7a2f2f;
  border:none;
  color:white;
}

button:hover{
  background:#b33;
}

#love{
  position:absolute;
  top:10px;
  left:10px;
  background:rgba(0,0,0,0.6);
  padding:5px;
}
</style>
</head>

<body>

<div id="love">好感度: 0</div>

<div id="character">
  <img id="charImg">
</div>

<div id="game">
  <div id="ui">
    <div id="name"></div>
    <div id="text"></div>
    <div id="choices"></div>
  </div>
</div>

<script>
// ===== 状態 =====
let love = 0;
let route = "";

// ===== 江戸風背景（固定） =====
const backgrounds = {
  castle:"https://images.unsplash.com/photo-1600585154340-be6161a56a0c",
  tatami:"https://images.unsplash.com/photo-1585559605151-4d6a6aeb8f8d",
  night:"https://images.unsplash.com/photo-1501785888041-af3ef285b470"
};

// ===== イケメン画像（AI風） =====
const images = {
  nobunaga:"https://images.unsplash.com/photo-1607746882042-944635dfe10e",
  hideyoshi:"https://images.unsplash.com/photo-1544005313-94ddf0286df2",
  masamune:"https://images.unsplash.com/photo-1535713875002-d1d0cf377fde",

  yukimura:"https://images.unsplash.com/photo-1547425260-76bcadfb4f2c",
  ieyasu:"https://images.unsplash.com/photo-1500648767791-00dcc994a43e",
  mitsunari:"https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e",
  motonari:"https://images.unsplash.com/photo-1544725176-7c40e5a2c9f9"
};

// ===== ボイス =====
function speak(text){
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang="ja-JP";
  speechSynthesis.speak(msg);
}

// ===== シナリオ =====
const story = {

start:{
  bg:"castle",
  text:"江戸の世――あなたは誰と運命を紡ぐ？",
  choices:[
    {text:"織田信長", next:"n1"},
    {text:"豊臣秀吉", next:"h1"},
    {text:"伊達政宗", next:"m1"},
    {text:"真田幸村", next:"y1"},
    {text:"徳川家康", next:"i1"},
    {text:"石田三成", next:"mi1"},
    {text:"毛利元就", next:"mo1"}
  ]
},

// ===== 幸村 =====
y1:{
  bg:"tatami",
  char:"真田幸村",
  img:"yukimura",
  setRoute:"y",
  text:"命を賭ける覚悟はあるか？",
  choices:[
    {text:"ある！ +10", next:"judge", love:10},
    {text:"ない… -5", next:"bad", love:-5}
  ]
},

// ===== 家康 =====
i1:{
  bg:"tatami",
  char:"徳川家康",
  img:"ieyasu",
  setRoute:"i",
  text:"焦るな、時を待て。",
  choices:[
    {text:"信じる +10", next:"judge", love:10},
    {text:"退屈 -5", next:"bad", love:-5}
  ]
},

// ===== 三成 =====
mi1:{
  bg:"tatami",
  char:"石田三成",
  img:"mitsunari",
  setRoute:"mi",
  text:"理で動くべきだ。",
  choices:[
    {text:"賛成 +10", next:"judge", love:10},
    {text:"冷たい -5", next:"bad", love:-5}
  ]
},

// ===== 元就 =====
mo1:{
  bg:"tatami",
  char:"毛利元就",
  img:"motonari",
  setRoute:"mo",
  text:"三本の矢を知っているか？",
  choices:[
    {text:"知ってる +10", next:"judge", love:10},
    {text:"知らない -5", next:"bad", love:-5}
  ]
},

// ===== 既存キャラ =====
n1:{
  bg:"tatami",
  char:"織田信長",
  img:"nobunaga",
  setRoute:"n",
  text:"俺に従え。",
  choices:[
    {text:"従う +10", next:"judge", love:10},
    {text:"拒否 -5", next:"bad", love:-5}
  ]
},

h1:{
  bg:"tatami",
  char:"豊臣秀吉",
  img:"hideyoshi",
  setRoute:"h",
  text:"楽しませてくれや！",
  choices:[
    {text:"笑う +10", next:"judge", love:10},
    {text:"無視 -5", next:"bad", love:-5}
  ]
},

m1:{
  bg:"night",
  char:"伊達政宗",
  img:"masamune",
  setRoute:"m",
  text:"退屈は嫌いだ。",
  choices:[
    {text:"楽しませる +10", next:"judge", love:10},
    {text:"黙る -5", next:"bad", love:-5}
  ]
},

// ===== 判定 =====
judge:{
  bg:"night",
  text:"運命の結果は――",
  choices:[
    {text:"見る", next:"result"}
  ]
},

result:{
  bg:"night",
  text:function(){
    if(love>=10) return "恋が実った――❤️";
    return "想いは届かなかった…";
  },
  choices:[
    {text:"最初へ", next:"start"}
  ]
},

bad:{
  bg:"night",
  text:"関係は終わった…",
  choices:[
    {text:"戻る", next:"start"}
  ]
}

};

// ===== 表示 =====
function showScene(key){
  const s = story[key];

  // 背景
  document.body.style.backgroundImage = "url("+backgrounds[s.bg]+")";

  // ルート
  if(s.setRoute){
    route = s.setRoute;
    love = 0;
  }

  // テキスト
  const text = typeof s.text==="function"?s.text():s.text;
  document.getElementById("text").innerText = text;

  // 名前
  document.getElementById("name").innerText = s.char || "";

  // 画像
  if(s.img){
    document.getElementById("charImg").src = images[s.img];
  } else {
    document.getElementById("charImg").src = "";
  }

  // 好感度
  document.getElementById("love").innerText = "好感度: "+love;

  speak(text);

  // 選択肢
  const div = document.getElementById("choices");
  div.innerHTML="";

  s.choices.forEach(c=>{
    const btn=document.createElement("button");
    btn.innerText=c.text;

    btn.onclick=()=>{
      if(c.love) love+=c.love;
      showScene(c.next);
    };

    div.appendChild(btn);
  });
}

showScene("start");
</script>

</body>
</html>
